<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="../styles/admin.css">
</head>
<body>
    <h1>Admin Panel</h1>
    <nav>
       <a href="/main" class="btn-back-main">
            <!-- SVG left arrow -->
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" style="vertical-align:middle; margin-right:7px;">
                <path d="M12.5 15L8 10L12.5 5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back to Main
        </a>
    </nav>
    <section id="users-section">
        <h2>Users</h2>
        <table id="users-table">
            <thead>
                <tr><th>ID</th><th>Username</th><th>Email</th><th>Admin</th><th>Delete</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
    <section id="reviews-section">
        <h2>Reviews</h2>
        <table id="reviews-table">
            <thead>
                <tr><th>ID</th><th>User ID</th><th>Entity</th><th>Category</th><th>Comment</th><th>Rating</th><th>Delete</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
    <section id="bugs-section">
        <h2>Bug Reports</h2>
        <table id="bugs-table">
            <thead>
                <tr><th>ID</th><th>User</th><th>Description</th><th>Created At</th><th>Delete</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
    <script src="../scripts/admin.js"></script>
</body>
</html>
